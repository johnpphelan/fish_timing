<!DOCTYPE html>
<htmlmeta charset="utf-8"><html>
    <title>Species Vulnerability</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        select {
            margin-right: 20px;
            padding: 5px;
        }

        #plot {
            width: 100%;
            height: 700px;
        }
    </style>
</head>
<body>

<h2>Species Vulnerability Explorer</h2>

<label>Location:</label>
<select id="locationDropdown"></select>

<label>Species:</label>
<select id="speciesDropdown"></select>

<div id="plot"></div>

<script>

let data;

// Robust file loading (handles comma OR tab automatically)
d3.text("vulnerability_data.csv").then(function(raw) {

    const delimiter = raw.includes("\t") ? "\t" : ",";
    const parsed = d3.dsvFormat(delimiter).parse(raw);

    data = parsed
        .map(d => ({
            loc: d.loc ? d.loc.trim() : "",
            species: d.species ? d.species.trim() : "",
            time_order: +d.time_order,
            month: d.month,
            half_month: +d.half_month,
            vulnerability: +d.vulnerability_score,
            stage: d.stage ? d.stage : "Unknown"
        }))
        .filter(d =>
            d.loc !== "" &&
            d.species !== "" &&
            !isNaN(d.time_order) &&
            !isNaN(d.vulnerability)
        );

    console.log("Data loaded:", data.slice(0,5));

    initializeLocationDropdown();
});

function initializeLocationDropdown() {

    const locations = [...new Set(data.map(d => d.loc))].sort();

    const dropdown = document.getElementById("locationDropdown");

    locations.forEach(loc => {
        const option = document.createElement("option");
        option.value = loc;
        option.text = loc;
        dropdown.appendChild(option);
    });

    dropdown.addEventListener("change", updateSpeciesDropdown);

    updateSpeciesDropdown();
}

function updateSpeciesDropdown() {

    const loc = document.getElementById("locationDropdown").value;

    const species = [...new Set(
        data
            .filter(d => d.loc === loc)
            .map(d => d.species)
    )].sort();

    const dropdown = document.getElementById("speciesDropdown");
    dropdown.innerHTML = "";

    species.forEach(sp => {
        const option = document.createElement("option");
        option.value = sp;
        option.text = sp;
        dropdown.appendChild(option);
    });

    dropdown.onchange = drawPlot;

    drawPlot();
}

function drawPlot() {

    const loc = document.getElementById("locationDropdown").value;
    const species = document.getElementById("speciesDropdown").value;

    const filtered = data
        .filter(d =>
            d.loc === loc &&
            d.species === species
        )
        .sort((a, b) => a.time_order - b.time_order);

    // Debug check
    console.log("Filtered:", filtered);

    const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    const tickvals = d3.range(24);

    const ticktext = tickvals.map(i =>
        i % 2 === 0 ? monthNames[i / 2].slice(0, 3) : ""
    );

    const trace = {
        x: filtered.map(d => d.time_order),
        y: filtered.map(d => d.vulnerability),

        // IMPORTANT: use customdata (this fixes your issue)
        customdata: filtered.map(d => [
            d.month,
            d.half_month === 1 ? "Early" : "Late",
            d.stage
        ]),

        hovertemplate:
            "<b>%{customdata[0]} (%{customdata[1]})</b><br>" +
            "Stage: %{customdata[2]}<br>" +
            "Vulnerability: %{y}<br>" +
            "<extra></extra>",

        mode: "lines+markers",
        type: "scatter",
        name: species,

        line: {
            shape: "hv"
        }
    };

    Plotly.newPlot("plot", [trace], {
        title: `${species} (${loc})`,

        xaxis: {
            title: "Month",
            tickvals: tickvals,
            ticktext: ticktext
        },

        yaxis: {
            title: "Vulnerability Score",
            tickvals: [1, 2, 3, 4, 5],
            ticktext: [
                "1 (Very Low)",
                "2 (Low)",
                "3 (Moderate)",
                "4 (High)",
                "5 (Very High)"
            ],
            range: [0.5, 5.5]
        }
    });
}

</script>

</body>
</html>
