<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Species Vulnerability</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        select {
            margin-right: 20px;
            padding: 5px;
        }

        #plot {
            width: 100%;
            height: 700px;
        }
    </style>
</head>
<body>

<h2>Species Vulnerability Explorer</h2>

<label>Location:</label>
<select id="locationDropdown"></select>

<label>Species:</label>
<select id="speciesDropdown"></select>

<div id="plot"></div>

<script>

let data;

d3.csv("vulnerability_data.csv")
    .then(function(csvData) {

        console.log("CSV loaded");
        console.log(csvData);

        data = csvData
            .filter(d => d.vulnerability_score !== "")
            .map(d => ({
                loc: d.loc,
                species: d.species,
                time_order: +d.time_order,
                month: d.month,
                half_month: +d.half_month,
                vulnerability: +d.vulnerability_score
            }));

        console.log("Processed data:");
        console.log(data.slice(0, 5));

        initializeLocationDropdown();
    })
    .catch(function(error) {
        console.error("CSV loading failed:", error);
    });

function initializeLocationDropdown() {

    const locations =
        [...new Set(data.map(d => d.loc))]
        .sort();

    const locationDropdown =
        document.getElementById("locationDropdown");

    locations.forEach(loc => {

        const option = document.createElement("option");

        option.value = loc;
        option.text = loc;

        locationDropdown.appendChild(option);
    });

    locationDropdown.addEventListener(
        "change",
        updateSpeciesDropdown
    );

    updateSpeciesDropdown();
}

function updateSpeciesDropdown() {

    const loc =
        document.getElementById("locationDropdown").value;

    const species =
        [...new Set(
            data
                .filter(d => d.loc === loc)
                .map(d => d.species)
        )]
        .sort();

    const speciesDropdown =
        document.getElementById("speciesDropdown");

    speciesDropdown.innerHTML = "";

    species.forEach(sp => {

        const option = document.createElement("option");

        option.value = sp;
        option.text = sp;

        speciesDropdown.appendChild(option);
    });

    speciesDropdown.onchange = drawPlot;

    drawPlot();
}

function drawPlot() {

    const loc =
        document.getElementById("locationDropdown").value;

    const species =
        document.getElementById("speciesDropdown").value;

    const filtered =
        data.filter(d =>
            d.loc === loc &&
            d.species === species
        );

    filtered.sort(
        (a, b) => a.time_order - b.time_order
    );

    const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
];

const tickvals = d3.range(24);
const ticktext = tickvals.map(i =>
    i % 2 === 0 ? monthNames[i / 2].slice(0, 3) : ""
);

    const trace = {

        x: filtered.map(d => d.time_order),

        y: filtered.map(d => d.vulnerability),

        mode: "lines+markers",

        type: "scatter",

        name: species,

        line: {
            shape: "hv"
        }
    };

    Plotly.newPlot(
        "plot",
        [trace],
        {
            title: `${species} (${loc})`,

            xaxis: {
                title: "Month",
                tickvals: tickvals,
                ticktext: ticktext
            },

            yaxis: {
                title: "Vulnerability Score",
                tickvals: [1, 2, 3, 4, 5],
                ticktext: [
                    "1 (Very Low)",
                    "2 (Low)",
                    "3 (Moderate)",
                    "4 (High)",
                    "5 (Very High)"
                ],
                range: [0.5, 5.5]
            }
        }
    );
}

</script>

</body>
</html>
